name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            export APP_DIR="${{ vars.APP_DIR || '/srv/jeeves' }}"
            export DEPLOY_BRANCH="${{ vars.DEPLOY_BRANCH || 'main' }}"
            /usr/bin/env bash "${APP_DIR}/deploy/deploy.sh"
