services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env
    volumes:
      - jeeves_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-same-origin}
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  jeeves_data:
